version: '3.8'

services:
  # CampusHub H5 SSR 应用
  app:
    image: ${ACR_REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${ACR_NAMESPACE:-your-namespace}/campushub-h5:latest
    container_name: campushub-h5
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # 从 .env.production 文件读取
      - VITE_BASE_URL=${VITE_BASE_URL}
      - VITE_PROD_BASE_URL=${VITE_PROD_BASE_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - VITE_APP_NAME=${VITE_APP_NAME:-CampusHub}
      - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
      - VITE_DEBUG=${VITE_DEBUG:-false}
      - VITE_GEETEST_ID=${VITE_GEETEST_ID}
    networks:
      - campushub-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 内存优化配置（1.5GB 服务器）
    deploy:
      resources:
        limits:
          cpus: '0.5'      # 限制 CPU 使用（1/2 核心）
          memory: 768M      # 限制内存使用（保留 512MB 给系统）
        reservations:
          cpus: '0.25'     # 保留 CPU（1/4 核心）
          memory: 384M      # 保留内存

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: campushub-nginx
    restart: unless-stopped
    ports:
      - "3029:80"
      # - "443:443"  # 如需 HTTPS
    volumes:
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 证书目录（如果使用 HTTPS）
      - ./ssl:/etc/nginx/ssl:ro
      # Nginx 缓存目录
      - nginx-cache:/var/cache/nginx:rw
      # Nginx 日志目录
      - nginx-logs:/var/log/nginx:rw
    depends_on:
      - app
    networks:
      - campushub-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Nginx 内存优化
    deploy:
      resources:
        limits:
          cpus: '0.25'      # 限制 CPU 使用
          memory: 128M       # 限制内存使用
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  campushub-network:
    driver: bridge

volumes:
  nginx-cache:
  nginx-logs: