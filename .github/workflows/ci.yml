name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop

env:
  NODE_VERSION: '18'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build H5 (check only)
        run: npm run build:h5:ssr

      - name: Build WeChat Mini Program (check only)
        run: npm run build:mp-weixin
